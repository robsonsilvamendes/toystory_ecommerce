version: 2

models:
  - name: fct_orders
    description: "Tabela fato de pedidos. Cada linha representa um pedido completo com dados financeiros, atribuição de tráfego e flags de reembolso."
    config:
      contract:
        enforced: true
    columns:
      - name: order_id
        description: "Identificador único do pedido (PK)"
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: created_at
        description: "Timestamp de criação do pedido"
        data_type: timestamp
        tests:
          - not_null
      - name: website_session_id
        description: "Identificador da sessão web que gerou o pedido (FK)"
        data_type: bigint
      - name: user_id
        description: "Identificador do usuário que fez o pedido (FK)"
        data_type: bigint
        tests:
          - not_null
      - name: primary_product_id
        description: "Identificador do produto principal do pedido (FK)"
        data_type: bigint
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: primary_product_name
        description: "Nome do produto principal"
        data_type: varchar
      - name: items_purchased
        description: "Quantidade de itens comprados no pedido"
        data_type: bigint
      - name: price_usd
        description: "Valor total do pedido em USD"
        data_type: double
      - name: cogs_usd
        description: "Custo dos produtos vendidos em USD"
        data_type: double
      - name: profit_usd
        description: "Lucro bruto (price - cogs) em USD"
        data_type: double
      - name: total_refund_usd
        description: "Valor total reembolsado em USD"
        data_type: double
      - name: net_revenue_usd
        description: "Receita líquida (price - reembolsos) em USD"
        data_type: double
      - name: utm_source
        description: "Fonte de tráfego UTM"
        data_type: varchar
      - name: utm_campaign
        description: "Campanha de marketing UTM"
        data_type: varchar
      - name: utm_content
        description: "Conteúdo/variante do anúncio UTM"
        data_type: varchar
      - name: device_type
        description: "Tipo de dispositivo (mobile/desktop)"
        data_type: varchar
      - name: http_referer
        description: "URL de referência"
        data_type: varchar
      - name: is_repeat_session
        description: "Flag indicando se a sessão é de retorno"
        data_type: bigint
      - name: is_refunded
        description: "Flag: TRUE se algum item do pedido foi reembolsado"
        data_type: boolean
      - name: total_items_refunded
        description: "Quantidade de itens reembolsados no pedido"
        data_type: hugeint

  - name: fct_website_sessions
    description: "Tabela fato de sessões web. Cada linha representa uma sessão com dados de tráfego, engajamento e conversão."
    config:
      contract:
        enforced: true
    columns:
      - name: website_session_id
        description: "Identificador único da sessão (PK)"
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: created_at
        description: "Timestamp de início da sessão"
        data_type: timestamp
        tests:
          - not_null
      - name: user_id
        description: "Identificador do usuário (FK)"
        data_type: bigint
        tests:
          - not_null
      - name: is_repeat_session
        description: "Flag indicando se é uma sessão de retorno"
        data_type: bigint
      - name: utm_source
        description: "Fonte de tráfego UTM"
        data_type: varchar
      - name: utm_campaign
        description: "Campanha de marketing UTM"
        data_type: varchar
      - name: utm_content
        description: "Conteúdo/variante do anúncio UTM"
        data_type: varchar
      - name: device_type
        description: "Tipo de dispositivo (mobile/desktop)"
        data_type: varchar
      - name: http_referer
        description: "URL de referência"
        data_type: varchar
      - name: total_pageviews
        description: "Total de páginas visualizadas na sessão"
        data_type: bigint
      - name: landing_page
        description: "URL da primeira página visitada"
        data_type: varchar
      - name: exit_page
        description: "URL da última página visitada"
        data_type: varchar
      - name: order_id
        description: "Identificador do pedido gerado (NULL se não converteu)"
        data_type: bigint
      - name: is_converted
        description: "Flag: TRUE se a sessão gerou um pedido"
        data_type: boolean
      - name: order_price_usd
        description: "Valor do pedido em USD (NULL se não converteu)"
        data_type: double
      - name: order_price_usd
        description: "Valor do pedido em USD (NULL se não converteu)"
        data_type: double
      - name: order_items_purchased
        description: "Itens comprados no pedido (NULL se não converteu)"
        data_type: bigint

  - name: dim_products
    description: "Dimensão de produtos enriquecida com métricas agregadas de vendas e reembolsos."
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        description: "Identificador único do produto (PK)"
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Nome do produto"
        data_type: varchar
        tests:
          - not_null
      - name: created_at
        description: "Data de lançamento do produto"
        data_type: timestamp
      - name: total_orders
        description: "Total de pedidos contendo este produto"
        data_type: bigint
      - name: total_revenue_usd
        description: "Receita total gerada pelo produto em USD"
        data_type: double
      - name: total_refunds
        description: "Total de itens reembolsados deste produto"
        data_type: hugeint
      - name: refund_rate_pct
        description: "Taxa de reembolso em percentual"
        data_type: double

  - name: dim_users
    description: "Dimensão de usuários com métricas de comportamento, atribuição de primeiro toque e flags de retenção."
    config:
      contract:
        enforced: true
    columns:
      - name: user_id
        description: "Identificador único do usuário (PK)"
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: first_session_at
        description: "Timestamp da primeira sessão do usuário"
        data_type: timestamp
        tests:
          - not_null
      - name: first_order_at
        description: "Timestamp do primeiro pedido (NULL se nunca comprou)"
        data_type: timestamp
      - name: total_sessions
        description: "Total de sessões do usuário"
        data_type: bigint
      - name: total_orders
        description: "Total de pedidos realizados"
        data_type: bigint
      - name: total_revenue_usd
        description: "Receita total gerada pelo usuário em USD"
        data_type: double
      - name: first_utm_source
        description: "Fonte UTM da primeira sessão"
        data_type: varchar
      - name: first_utm_campaign
        description: "Campanha UTM da primeira sessão"
        data_type: varchar
      - name: first_utm_content
        description: "Conteúdo UTM da primeira sessão"
        data_type: varchar
      - name: first_device_type
        description: "Tipo de dispositivo da primeira sessão"
        data_type: varchar
      - name: first_http_referer
        description: "URL de referência da primeira sessão"
        data_type: varchar
      - name: is_repeat_customer
        description: "Flag: TRUE se o usuário fez mais de 1 pedido"
        data_type: boolean
